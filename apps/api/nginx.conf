# ── HardGraph API nginx (optional — use if placing nginx in front of API container)
# This config is for running nginx INSIDE the api container or as a sidecar.
# For the main reverse proxy config, use the root nginx.conf.

upstream api_backend {
    server 127.0.0.1:4000;
    keepalive 8;
}

server {
    listen 8080;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY" always;

    client_max_body_size 10M;

    # API proxy
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # Health endpoint
    location = /health {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # Block everything else
    location / {
        return 404;
    }

    gzip on;
    gzip_types application/json;
    gzip_min_length 1000;
}