services:
  postgres:
    image: postgres:16-alpine
    container_name: skillgraph-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillgraph_dev}
      POSTGRES_DB: ${POSTGRES_DB:-skillgraph}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-skillgraph}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
