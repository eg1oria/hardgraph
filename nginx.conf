# ── HardGraph production nginx ──────────────────────────────────
# Reverse proxy: Next.js (web:3000) + NestJS API (api:4000)

# Rate-limiting zone: 10 req/s per IP for API, burst allowed
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

# Upstream definitions
upstream frontend {
    server web:3000;
    keepalive 16;
}

upstream backend {
    server api:4000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ────────────────────────────────
server {
    listen 80;
    server_name nataliagorlach.kz www.nataliagorlach.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name nataliagorlach.kz www.nataliagorlach.kz;

    ssl_certificate     /etc/letsencrypt/live/nataliagorlach.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nataliagorlach.kz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Body & timeouts ──────────────────────────────────────
    client_max_body_size 10M;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    send_timeout          30s;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Block access to hidden/sensitive files ───────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* ^/(\.env|docker-compose|Dockerfile|package\.json|prisma|node_modules) {
        deny all;
        return 404;
    }

    # ── Healthcheck (for load balancer / monitoring) ─────────
    location = /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── Next.js static assets — immutable long-term cache ────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Public directory assets (favicon etc) ────────────────
    location /public/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── Auth endpoints — stricter rate limit ─────────────────
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── API — rate-limited reverse proxy ─────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Disable buffering for SSE/streaming if needed
        proxy_buffering off;
    }

    # ── Backend healthcheck (no rate limit) ──────────────────
    location = /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Frontend (Next.js SSR/CSR) — catch-all ───────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# WebSocket connection upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}